name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check panviz tests

      - name: Type check (mypy, non-blocking)
        run: mypy panviz
        continue-on-error: true

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: JS syntax check (export adapter + post-processing)
        run: node --check harness/export_mainfig_natural.js && node --check harness/lib/postprocess.js

      - name: Structural regression (offline fixtures)
        run: python tests/check_svg_structure.py

      - name: CLI smoke
        run: |
          python scripts/panviz version
          python scripts/panviz validate
